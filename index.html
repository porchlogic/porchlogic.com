<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Landing Page</title>
    <style>
        :root {
            --link-color: rgba(255, 255, 255, 0.72);
            --link-hover: rgba(255, 255, 255, 0.96);
            --shadow: rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #000;
            overflow: hidden;
        }

        .page {
            position: relative;
            width: 100vw;
            height: 100vh;
            isolation: isolate;
        }

        .hero-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: -2;
        }

        .vignette {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at center, transparent 45%, rgba(0, 0, 0, 0.28) 100%),
                linear-gradient(to top, rgba(0, 0, 0, 0.42), transparent 34%);
            z-index: -1;
            pointer-events: none;
        }

        .social-links {
            position: absolute;
            left: 50%;
            bottom: max(env(safe-area-inset-bottom, 0px), clamp(20px, 4vh, 44px));
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(16px, 3vw, 30px);
            padding: 14px 22px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10;
            visibility: visible;
            opacity: 1;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            color: var(--link-color);
            text-decoration: none;
            filter: drop-shadow(0 1px 8px var(--shadow));
            transition: color 160ms ease, opacity 160ms ease, transform 160ms ease;
            opacity: 0.82;
        }

        .social-links svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        .social-links a:hover,
        .social-links a:focus-visible {
            color: var(--link-hover);
            opacity: 1;
            transform: translateY(-1px);
        }

        .social-links a:focus-visible {
            outline: 1px solid currentColor;
            outline-offset: 6px;
            border-radius: 999px;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 520px) {
            .social-links {
                gap: 14px;
                padding: 12px 18px;
            }
        }
    </style>
</head>
