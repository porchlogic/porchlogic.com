<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>M8 PLATE Layout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --bg: #e3e3e3;
            --border: #dedede;
            --text-main: #111;
            --text-muted: #777;
            --accent: #ff9a2c;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /* Custom styles to hide scrollbars but keep functionality if JS fails (graceful degradation) */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Smooth fade for UI elements */
        .ui-fade {
            transition: opacity 0.3s ease;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            
            background: var(--bg);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                sans-serif;
            color: var(--text-main);

            width: 100%;
            height: 100vh;
            
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            object-fit: contain;
        }


        main {
            aspect-ratio: 2/3;

            max-width: 95%;
            max-height: 100%;

            width: min(100%, calc(100vh * 2/3));
            height: min(100%, calc(100vw * 3/2));

            /* width: 100%;
            height: 100%; */
            
            
            background-color: var(--border);

            display: flex;
            flex-direction: column;
            
            position: relative;
        }

        h1 {
            position: absolute;
            top: 0;
            left: 0;

            transform: rotate(90deg) translateY(-100%);
            transform-origin: top left;

            font-size: 3rem;
            z-index: 0;
            margin: 0;

            padding: 1rem;
        }


        .content {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .hero {
            aspect-ratio: 1/1;

            width: 100%;
            height: 70%;

            max-width: 100%;
            max-height: 100%;

            z-index: 5;
        }

        .attributes {
            width: 100%;
            height: 30%;

            display: grid;
            grid-template-columns: repeat(2, 1fr);
	        grid-template-rows: repeat(2, 1fr);
        }

        .attribute {
            /* border: 1px solid var(--text-muted); */

            display: flex;
            flex-direction: column;
        }




        h2 {
            font-size:medium;
            padding: 0.5em;
        }


        /* Root carousel container:
        - Fills its parent
        - Parent decides aspect/height
        */
        .pl-carousel {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* Track of slides */
        .pl-carousel__track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-out;
            will-change: transform;
        }

        /* Each slide: full size of carousel */
        .pl-carousel__slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Images fill slide */
        .pl-carousel__slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Arrows */
        .pl-carousel__arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
            padding: 0;
            user-select: none;
        }

        .pl-carousel__arrow--prev {
            left: 0.5rem;
        }

        .pl-carousel__arrow--next {
            right: 0.5rem;
        }

        .pl-carousel__arrow:focus-visible {
            outline: 2px solid #fff;
            outline-offset: 2px;
        }

        /* Dots */
        .pl-carousel__dots {
            position: absolute;
            left: 50%;
            bottom: 0.75rem;
            transform: translateX(-50%);
            display: flex;
            gap: 0.4rem;
        }

        .pl-carousel__dots button {
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 999px;
            border: none;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 0;
        }

        .pl-carousel__dots button.is-active {
            background: rgba(255, 255, 255, 0.95);
        }

        /* Optional: hide arrows on very small screens if desired */
        /*
        @media (max-width: 480px) {
        .pl-carousel__arrow {
            display: none;
        }
        }
        */


    </style>
</head>

<body>
    <main>
        <h1>M8 PLATE</h1>
        <div class="content">
            <div class="hero">
                <div class="pl-carousel" data-carousel>
                    <div class="pl-carousel__track" data-carousel-track>
                        <div class="pl-carousel__slide is-active">
                            <img src="/images/m8-hero-1.png" alt="Image 1">
                        </div>
                        <div class="pl-carousel__slide">
                            <img src="image2.jpg" alt="Image 2">
                        </div>
                        <div class="pl-carousel__slide">
                            <img src="image3.jpg" alt="Image 3">
                        </div>
                    </div>
                
                    <button class="pl-carousel__arrow pl-carousel__arrow--prev" data-carousel-prev>
                        ‹
                    </button>
                    <button class="pl-carousel__arrow pl-carousel__arrow--next" data-carousel-next>
                        ›
                    </button>
                
                    <div class="pl-carousel__dots" data-carousel-dots></div>
                </div>

            </div>
            
            <div class="attributes">
                <div class="attribute">
                    <h2>Material</h2>
                </div>
                <div class="attribute">
                    <h2>Material</h2>
                </div>
                <div class="attribute">
                    <h2>Material</h2>
                </div>
                <div class="attribute">
                    <h2>Material</h2>
                </div>
            </div>
        </div>
        
    </main>

    <script>
        (function () {
            // Initialize all carousels on the page
            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('[data-carousel]').forEach(initCarousel);
            });

            function initCarousel(root) {
                const track = root.querySelector('[data-carousel-track]');
                const slides = Array.from(root.querySelectorAll('.pl-carousel__slide'));
                const prevBtn = root.querySelector('[data-carousel-prev]');
                const nextBtn = root.querySelector('[data-carousel-next]');
                const dotsContainer = root.querySelector('[data-carousel-dots]');

                if (!track || slides.length === 0) return;

                let currentIndex = 0;

                // Build dots
                const dots = slides.map((_, index) => {
                    const btn = document.createElement('button');
                    if (index === 0) btn.classList.add('is-active');
                    btn.addEventListener('click', function () {
                        goToSlide(index);
                    });
                    dotsContainer.appendChild(btn);
                    return btn;
                });

                function updateUI() {
                    track.style.transform = `translateX(-${currentIndex * 100}%)`;
                    slides.forEach((s, i) => {
                        s.classList.toggle('is-active', i === currentIndex);
                    });
                    dots.forEach((d, i) => {
                        d.classList.toggle('is-active', i === currentIndex);
                    });
                }

                function goToSlide(index) {
                    const count = slides.length;
                    currentIndex = (index + count) % count; // wrap-around
                    updateUI();
                }

                function next() {
                    goToSlide(currentIndex + 1);
                }

                function prev() {
                    goToSlide(currentIndex - 1);
                }

                // Buttons
                if (prevBtn) prevBtn.addEventListener('click', prev);
                if (nextBtn) nextBtn.addEventListener('click', next);

                // Touch swipe
                let startX = 0;
                let currentX = 0;
                let isDragging = false;
                const swipeThreshold = 40; // px

                function onTouchStart(e) {
                    const touch = e.touches[0];
                    startX = touch.clientX;
                    currentX = startX;
                    isDragging = true;
                }

                function onTouchMove(e) {
                    if (!isDragging) return;
                    const touch = e.touches[0];
                    currentX = touch.clientX;
                }

                function onTouchEnd() {
                    if (!isDragging) return;
                    const deltaX = currentX - startX;
                    if (Math.abs(deltaX) > swipeThreshold) {
                        if (deltaX < 0) {
                            // swipe left -> next
                            next();
                        } else {
                            // swipe right -> prev
                            prev();
                        }
                    }
                    isDragging = false;
                }

                track.addEventListener('touchstart', onTouchStart, { passive: true });
                track.addEventListener('touchmove', onTouchMove, { passive: true });
                track.addEventListener('touchend', onTouchEnd);
            }
        })();
    </script>


</body>

</html>
